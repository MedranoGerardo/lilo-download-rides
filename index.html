<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lilo Rides - Descargar</title>

  <script>
    window.onload = function () {
      const androidUrl = "https://play.google.com/store/apps/details?id=com.creativefeeldev.liloapp&pcampaignid=web_share";
      const iosUrl = "https://apps.apple.com/us/app/lilo-rides/id6757496828";
      const fallbackUrl = "https://lilorides.com"; // opcional

      const userAgent = navigator.userAgent || navigator.vendor || window.opera;

      if (/android/i.test(userAgent)) {
        window.location.href = androidUrl;
      } else if (/iPhone|iPad|iPod/i.test(userAgent)) {
        window.location.href = iosUrl;
      } else {
        window.location.href = fallbackUrl;
      }
    };
  </script>

  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      padding: 50px;
    }
  </style>
</head>
<body>
  <h2>Redirigiendo a la tienda...</h2>
  <p>Si no pasa nada, toca el botón:</p>
  <a href="https://play.google.com/store/apps/details?id=com.creativefeeldev.liloapp&pcampaignid=web_share">
    Descargar App
  </a>
</body>
</html>
